server:
  port: 8081

spring:
  application:
    name: owasp-lab

  datasource:
    url: jdbc:h2:mem:owasp_lab;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

# MyBatis：XML 在 resources/mapper，下划线列名转驼峰
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

coach:
  llm:
    enabled: true
    provider: dashscope
    # 兼容：如果你已经用了 DASHSCOPE_API_KEY，也能生效
    apiKey: ${COACH_LLM_API_KEY:${DASHSCOPE_API_KEY:}}
    baseUrl: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-plus
    temperature: 0.2
    maxTokens: 900